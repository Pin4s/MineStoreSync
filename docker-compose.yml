version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: minestoresync
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    volumes:
      - ./pgdata:/var/lib/postgresql/data

volumes:
  pgdata: